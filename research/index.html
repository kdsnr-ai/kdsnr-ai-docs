<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kdsnr-ai · Research</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="../assets/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
</aside>
<script src="../assets/nav.js"></script>

<main class="content">

<h1>Research</h1>
<p class="lead">주요 AI/ML 기술 연구 일지 및 보고서입니다.<br>문제의식과 해결 아이디어를 중심으로 정리했습니다.</p>

<div class="cat-tabs">
  <button class="active" data-cat="all">전체</button>
  <button data-cat="model">Model</button>
  <button data-cat="infra">Infrastructure</button>
  <button data-cat="dataset">Dataset</button>
  <button data-cat="business">Business</button>
</div>

<div class="card-grid">
  <a class="card" data-cat="model" href="eqasm.html">
    <div class="card-thumb"><img src="../assets/research/eqasm.png" alt=""></div>
    <div class="card-body">
      <div class="card-title">EqASM 모델 연구·개발</div>
      <div class="card-sub">흩어진 수식 조각들을 LaTeX로 조립하기</div>
      <div class="card-meta"><span class="card-cat">Model</span><span>2026-07-18</span><span>작성자 : 권준희</span></div>
    </div>
  </a>
</div>

</main>

<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script>
hljs.highlightAll();
const tabs = document.querySelectorAll('.cat-tabs button');
tabs.forEach(btn => {
  btn.addEventListener('click', () => {
    tabs.forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.card-grid .card').forEach(card => {
      card.style.display = (btn.dataset.cat === 'all' || card.dataset.cat === btn.dataset.cat) ? '' : 'none';
    });
  });
});
</script>

</body>
</html>
